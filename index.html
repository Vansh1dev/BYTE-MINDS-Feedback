<form id="feedback-form" novalidate>
  <!-- 1. Name -->
  <div class="input-group">
    <label for="name">Agent Name</label>
    <input type="text" id="name" name="name" class="required" placeholder="Enter your full name" autocomplete="name" />
  </div>

  <!-- 2. Email -->
  <div class="input-group">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" class="required" placeholder="agent@byteminds.net" autocomplete="email" />
  </div>

  <!-- 3. Overall workshop rating (1–5) -->
  <div class="input-group">
    <label for="overallRating">How would you rate our workshop overall? (1‑5)</label>
    <div class="range-wrapper">
      <input type="range" id="overallRating" name="overallRating" min="1" max="5" value="3" class="required" />
      <span class="range-value" id="overallRatingValue">3</span>
    </div>
  </div>

  <!-- 4. Content clarity -->
  <div class="input-group required-radio-group" id="contentClarityGroup">
    <label>Was the content clear and easy to understand?</label>
    <div class="radio-group">
      <label class="radio-label">
        <input type="radio" name="contentClarity" value="Yes, completely" />
        <span class="radio-custom"></span> Yes, completely
      </label>
      <label class="radio-label">
        <input type="radio" name="contentClarity" value="Mostly clear" />
        <span class="radio-custom"></span> Mostly clear
      </label>
      <label class="radio-label">
        <input type="radio" name="contentClarity" value="Somewhat clear" />
        <span class="radio-custom"></span> Somewhat clear
      </label>
      <label class="radio-label">
        <input type="radio" name="contentClarity" value="Not very clear" />
        <span class="radio-custom"></span> Not very clear
      </label>
    </div>
    <span class="radio-error" id="contentClarityError"></span>
  </div>

  <!-- 5. Speaker presentation (1–5) -->
  <div class="input-group">
    <label for="speakerRating">How was the speaker's presentation? (1‑5)</label>
    <div class="range-wrapper">
      <input type="range" id="speakerRating" name="speakerRating" min="1" max="5" value="3" class="required" />
      <span class="range-value" id="speakerRatingValue">3</span>
    </div>
  </div>

  <!-- 6. Most useful part -->
  <div class="input-group">
    <label for="mostUseful">Which part of the workshop did you find most useful?</label>
    <textarea id="mostUseful" name="mostUseful" class="required" rows="3" placeholder="e.g., Phishing demo, Hands‑on lab..."></textarea>
  </div>

  <!-- 7. Most interesting part -->
  <div class="input-group">
    <label for="mostInteresting">Which part of the workshop did you find most interesting?</label>
    <textarea id="mostInteresting" name="mostInteresting" class="required" rows="3" placeholder="e.g., Live hacking demo..."></textarea>
  </div>

  <!-- 8. Key takeaway -->
  <div class="input-group">
    <label for="keyTakeaway">What was your insight or key takeaway from the workshop?</label>
    <textarea id="keyTakeaway" name="keyTakeaway" class="required" rows="3" placeholder="One thing you'll remember..."></textarea>
  </div>

  <!-- 9. Suggestions for improvement -->
  <div class="input-group">
    <label for="improvements">What improvements would you suggest?</label>
    <textarea id="improvements" name="improvements" class="required" rows="3" placeholder="How can we make it better?"></textarea>
  </div>

  <!-- 10. Additional comments (optional) -->
  <div class="input-group">
    <label for="additionalComments">Any additional comments or suggestions? <span style="color:#555">(optional)</span></label>
    <textarea id="additionalComments" name="additionalComments" rows="3" placeholder="Anything else you'd like to share..."></textarea>
  </div>

  <!-- 11. Would attend future workshops -->
  <div class="input-group required-radio-group" id="attendFutureGroup">
    <label>Would you attend future workshops by Byte Minds?</label>
    <div class="radio-group">
      <label class="radio-label">
        <input type="radio" name="attendFuture" value="Definitely yes" />
        <span class="radio-custom"></span> Definitely yes
      </label>
      <label class="radio-label">
        <input type="radio" name="attendFuture" value="Probably yes" />
        <span class="radio-custom"></span> Probably yes
      </label>
      <label class="radio-label">
        <input type="radio" name="attendFuture" value="Maybe" />
        <span class="radio-custom"></span> Maybe
      </label>
      <label class="radio-label">
        <input type="radio" name="attendFuture" value="Probably no" />
        <span class="radio-custom"></span> Probably no
      </label>
    </div>
    <span class="radio-error" id="attendFutureError"></span>
  </div>

  <button type="submit" class="submit-btn" id="submitBtn">
    <span class="btn-text">TRANSMIT FEEDBACK</span>
    <span class="btn-loader"></span>
  </button>
</form>
